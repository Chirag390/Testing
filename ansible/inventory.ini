# Ansible inventory — devops-demo project
# IPs are sourced from Terraform state (terraform/terraform.tfstate).
# Update public_ip values after every `terraform apply` if instances are recreated.
#
# Usage:
#   ansible-playbook -i ansible/inventory.ini --private-key ~/.ssh/devops-key.pem \
#     ansible/jenkins-setup.yml

# ── CI / CD servers ────────────────────────────────────────────────────────────
[jenkins]
jenkins ansible_host=34.205.90.146

[sonarqube]
sonarqube ansible_host=3.87.42.29

# ── Convenience group ──────────────────────────────────────────────────────────
[ci_cd:children]
jenkins
sonarqube

# ── SSH defaults (Amazon Linux 2023, key pair: devops-key) ────────────────────
[all:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/devops-key.pem
ansible_ssh_common_args=-o StrictHostKeyChecking=no
